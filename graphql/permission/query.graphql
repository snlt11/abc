extend type Query {
    permissions(
        search: String @where(operator: "like")
        orderBy: _ @orderBy(columns: ["name", "created_at"])
        paginate: Int = 10
        page: Int = 1
    ): PermissionPaginator! @paginate(defaultCount: 10)

    permission(
        id: ID! @eq @rules(apply: ["required", "exists:permissions,id"])
    ): Permission @find @guard(with: ["api"])
}
