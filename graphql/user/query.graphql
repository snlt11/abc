extend type Query {
    user(id: ID! @rules(apply: ["required", "exists:users,id"])): User
        @field(resolver: "App\\GraphQL\\Queries\\User\\UserQuery")
        @guard(with: ["api"])

    users(
        page: Int @rules(apply: ["integer", "min:1"])
        limit: Int @rules(apply: ["integer", "min:1", "max:100"])
    ): [User!]!
        @field(resolver: "App\\GraphQL\\Queries\\User\\UserListQuery")
        @guard(with: ["api"])
}
