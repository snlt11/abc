extend type Mutation {
    createModule(input: CreateModuleInput! @spread): Module
        @field(
            resolver: "App\\GraphQL\\Mutations\\Module\\CreateModuleMutation"
        )
        @guard(with: ["api"])

    updateModule(input: UpdateModuleInput! @spread): Module
        @field(
            resolver: "App\\GraphQL\\Mutations\\Module\\UpdateModuleMutation"
        )
        @guard(with: ["api"])

    deleteModule(
        id: ID! @rules(apply: ["required", "exists:modules,id"])
    ): Boolean!
        @field(
            resolver: "App\\GraphQL\\Mutations\\Module\\DeleteModuleMutation"
        )
        @guard(with: ["api"])
}
